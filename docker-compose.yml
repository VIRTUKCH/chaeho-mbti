# chaeho-mbti — 로컬 컨테이너 구성
#
# 프로파일로 환경을 분기한다. 기본(profile 미지정) 명령에는 아무 서비스도 뜨지 않음.
#
# - profile: feature  → nginx-feature(4080) + react-feature(npm run dev, 호스트 코드 마운트 → HMR)
# - profile: dev      → nginx-dev(4090)     + react-dev(빌드된 dist를 serve로 정적 서빙)
#
# 사용:
#   docker compose --profile feature up -d --build   # 작업 중 코드를 실시간으로 본다
#   docker compose --profile dev     up -d --build   # 빌드 스냅샷을 본다
#   docker compose --profile feature down            # feature만 내림
#   docker compose logs -f react-feature             # HMR 로그

services:
  nginx-feature:
    image: nginx:1.27-alpine
    container_name: chaeho-mbti-nginx-feature
    profiles: ["feature"]
    ports:
      - "4080:80"
    volumes:
      - ./01_proxy_nginx/feature.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - react-feature
    restart: unless-stopped

  nginx-dev:
    image: nginx:1.27-alpine
    container_name: chaeho-mbti-nginx-dev
    profiles: ["dev"]
    ports:
      - "4090:80"
    volumes:
      - ./01_proxy_nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - react-dev
    restart: unless-stopped

  react-feature:
    build:
      context: ./02_fe_react
      dockerfile: Dockerfile.feature
    container_name: chaeho-mbti-react-feature
    profiles: ["feature"]
    # 호스트 코드 마운트 → npm run dev가 변경 감지 → HMR로 nginx-feature(4080)에 실시간 반영
    volumes:
      - ./02_fe_react:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    expose:
      - "5173"
    restart: unless-stopped

  react-dev:
    build:
      context: ./02_fe_react
      dockerfile: Dockerfile.dev
    container_name: chaeho-mbti-react-dev
    profiles: ["dev"]
    # dev는 이미지 빌드 시점의 dist 스냅샷을 서빙. 갱신은 docker compose --profile dev build.
    expose:
      - "3000"
    restart: unless-stopped
